<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Kanban Visualizer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>⚡ Hermes Kanban — Isometric Office Viewer</h1>
      <div id="status-bar">
        <span id="ws-status" class="status disconnected">● Disconnected</span>
        <span id="task-count">0 tasks</span>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="zoom-reset" title="Reset zoom">↺</button>
      </div>
    </header>

    <main>
      <section id="scene-container">
        <div id="scene">
          <!-- Isometric office rendered by JS -->
        </div>
      </section>
      <aside id="sidebar">
        <h2>📋 Activity Feed</h2>
        <div id="event-feed"></div>
      </aside>
    </main>

    <div id="overlay" class="hidden">
      <div id="overlay-content">
        <button id="overlay-close">&times;</button>
        <div id="overlay-body"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
