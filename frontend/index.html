<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Kanban — Isometric Office</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0ede8;
      color: #2d2d2d;
    }

    /* ── Layout ──────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #ffffff;
      border-bottom: 1px solid #e0dcd5;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #5b5b5b;
      letter-spacing: 0.5px;
    }
    #status-bar {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .status {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 10px;
    }
    .status.connected { background: #e8f5e9; color: #2e7d32; }
    .status.disconnected { background: #fbe9e7; color: #c62828; }
    #task-count { font-size: 12px; color: #888; }
    #status-bar button {
      background: #f5f3ef;
      border: 1px solid #ddd8d0;
      color: #666;
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #status-bar button:hover { background: #ebe7df; }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Scene Container ────────────────────────────────── */
    #scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f5f3ef;
      cursor: grab;
      user-select: none;
    }
    #scene-container:active { cursor: grabbing; }
    #scene-container.panning { cursor: grabbing; }

    #scene-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      transition: none;
    }

    #scene-bg {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #task-layer {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* ── Sidebar ────────────────────────────────────────── */
    #sidebar {
      width: 280px;
      background: #ffffff;
      border-left: 1px solid #e0dcd5;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #sidebar h2 {
      font-size: 13px;
      padding: 14px 16px;
      border-bottom: 1px solid #e0dcd5;
      color: #5b5b5b;
      font-weight: 600;
    }
    #event-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .feed-entry {
      padding: 8px 10px;
      margin-bottom: 3px;
      background: #faf9f7;
      border-radius: 6px;
      border-left: 3px solid #ddd8d0;
      font-size: 11px;
      color: #555;
      line-height: 1.4;
    }
    .feed-entry .feed-time { color: #aaa; font-size: 10px; }
    .feed-entry .feed-task { color: #5b8c5a; font-weight: 500; }

    /* ── Task Desk ──────────────────────────────────────── */
    .desk-slot {
      position: absolute;
      cursor: pointer;
      transition: filter 0.15s;
      pointer-events: all;
    }
    .desk-slot:hover { filter: brightness(1.15) drop-shadow(0 4px 8px rgba(0,0,0,0.12)); }

    .desk-label {
      position: absolute;
      font-size: 9px;
      color: #5b5b5b;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
    }

    /* ── Overlay ─────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #overlay.hidden { display: none; }
    #overlay-content {
      background: #fff;
      border-radius: 14px;
      min-width: 380px;
      max-width: 560px;
      max-height: 78vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    #overlay-close {
      position: absolute;
      top: 14px; right: 14px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
    }
    #overlay-close:hover { color: #555; }
    #overlay-body { font-size: 13px; line-height: 1.7; color: #444; }
    #overlay-body h3 { color: #5b8c5a; margin-bottom: 10px; font-size: 16px; }
    #overlay-body hr { border-color: #e0dcd5; margin: 14px 0; }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd8d0; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ccc5bb; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>🏢 Hermes Office — Kanban View</h1>
      <div id="status-bar">
        <span id="ws-status" class="status disconnected">● Disconnected</span>
        <span id="task-count">0 tasks</span>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="zoom-reset" title="Reset view">↺</button>
      </div>
    </header>

    <main>
      <section id="scene-container">
        <div id="scene-wrapper">
          <svg id="scene-bg" xmlns="http://www.w3.org/2000/svg"></svg>
          <div id="task-layer"></div>
        </div>
      </section>
      <aside id="sidebar">
        <h2>📋 Activity Feed</h2>
        <div id="event-feed"></div>
      </aside>
    </main>

    <div id="overlay" class="hidden">
      <div id="overlay-content">
        <button id="overlay-close">&times;</button>
        <div id="overlay-body"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
