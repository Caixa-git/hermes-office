<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hermes Kanban — Isometric Office</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0ede8;
      color: #2d2d2d;
    }

    /* ── Layout: header + scene + chat panel ──────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e0dcd5;
      flex-shrink: 0;
      z-index: 20;
      min-height: 44px;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #5b5b5b;
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .status {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
    }
    .status.connected { background: #e8f5e9; color: #2e7d32; }
    .status.disconnected { background: #fbe9e7; color: #c62828; }
    #task-count { font-size: 11px; color: #888; white-space: nowrap; }
    #status-bar button {
      background: #f5f3ef;
      border: 1px solid #ddd8d0;
      color: #666;
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #status-bar button:active { background: #e8e4dc; }

    /* Mobile header collapse */
    @media (max-width: 600px) {
      header { padding: 6px 10px; }
      header h1 { font-size: 12px; }
      #task-count { display: none; }
      #zoom-reset { display: none; }
    }

    /* ── Scene (full remaining space) ────────────────────── */
    #scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f5f3ef;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #scene-container:active { cursor: grabbing; }
    #scene-container.panning { cursor: grabbing; }

    #scene-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      transition: none;
    }

    #scene-bg { position: absolute; top: 0; left: 0; pointer-events: none; }
    #task-layer { position: absolute; top: 0; left: 0; }

    /* ── Chat Panel (bottom) ─────────────────────────────── */
    #chat-panel {
      flex-shrink: 0;
      background: #ffffff;
      border-top: 1px solid #e0dcd5;
      display: flex;
      flex-direction: column;
      transition: max-height 0.25s ease;
      max-height: 40vh;
      z-index: 15;
    }
    #chat-panel.collapsed { max-height: 40px; }

    #chat-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: #888;
      width: 100%;
      flex-shrink: 0;
      min-height: 36px;
    }
    #chat-toggle:hover { background: #faf9f7; }
    #chat-badge {
      background: #5b8c5a;
      color: #fff;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 8px;
      min-width: 16px;
      text-align: center;
      opacity: 0.9;
    }
    #chat-badge:empty { display: none; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #chat-panel.collapsed #chat-messages { display: none; }

    /* Chat bubbles */
    .chat-msg {
      max-width: 85%;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.4;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .chat-msg.done { background: #e8f5e9; color: #2e7d32; align-self: flex-start; border-bottom-left-radius: 2px; }
    .chat-msg.active { background: #fff8e1; color: #b87814; align-self: flex-start; border-bottom-left-radius: 2px; }
    .chat-msg.failed { background: #fbe9e7; color: #c62828; align-self: flex-start; border-bottom-left-radius: 2px; }
    .chat-msg.neutral { background: #f5f3ef; color: #666; align-self: flex-start; border-bottom-left-radius: 2px; }
    .chat-msg .msg-id { font-size: 9px; opacity: 0.6; margin-bottom: 2px; }
    .chat-msg .msg-time { font-size: 9px; opacity: 0.5; float: right; margin-left: 8px; }

    /* ── Task Desk (SVG overlay) ─────────────────────────── */
    .desk-slot {
      position: absolute;
      cursor: pointer;
      transition: filter 0.12s;
      pointer-events: all;
    }
    .desk-slot:hover { filter: brightness(1.12) drop-shadow(0 3px 6px rgba(0,0,0,0.10)); }

    .desk-label {
      position: absolute;
      font-size: 9px;
      color: #5b5b5b;
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }

    /* ── Overlay ─────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #overlay.hidden { display: none; }
    #overlay-content {
      background: #fff;
      border-radius: 14px;
      min-width: min(380px, 90vw);
      max-width: min(560px, 95vw);
      max-height: 78vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    #overlay-close {
      position: absolute;
      top: 12px; right: 12px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 20px;
      cursor: pointer;
    }
    #overlay-body { font-size: 13px; line-height: 1.7; color: #444; }
    #overlay-body h3 { color: #5b8c5a; margin-bottom: 8px; }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd8d0; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>🏢 Hermes Office</h1>
      <div id="status-bar">
        <span id="ws-status" class="status disconnected">● Off</span>
        <span id="task-count">0</span>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-out" title="Zoom out">−</button>
        <button id="zoom-reset" title="Reset">↺</button>
      </div>
    </header>

    <section id="scene-container">
      <div id="scene-wrapper">
        <svg id="scene-bg" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="task-layer"></div>
      </div>
    </section>

    <div id="chat-panel">
      <button id="chat-toggle">
        <span>📋 Activity</span>
        <span id="chat-badge"></span>
      </button>
      <div id="chat-messages"></div>
    </div>

    <div id="overlay" class="hidden">
      <div id="overlay-content">
        <button id="overlay-close">&times;</button>
        <div id="overlay-body"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
